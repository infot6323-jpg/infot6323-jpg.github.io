<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragon Ball — Explorador</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange: #FF6B00;
      --gold: #FFB800;
      --red: #CC1F1F;
      --dark: #080808;
      --card-bg: #111111;
      --surface: #181818;
      --text: #EDEDEC;
      --muted: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND AURA ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% -10%, rgba(255,107,0,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 110%, rgba(204,31,31,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      padding: 48px 40px 36px;
      text-align: center;
      border-bottom: 1px solid rgba(255,107,0,0.15);
    }

    .logo-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 32px;
    }

    .logo-eyebrow {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      color: var(--orange);
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      line-height: 0.9;
      letter-spacing: 0.04em;
      background: linear-gradient(160deg, #fff 30%, var(--gold) 70%, var(--orange) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }

    .search-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      width: min(480px, 90vw);
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 14px 18px 14px 46px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,107,0,0.25);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #search::placeholder { color: var(--muted); }

    #search:focus {
      border-color: var(--orange);
      background: rgba(255,107,0,0.07);
    }

    /* ── STATS BAR ── */
    #stats-bar {
      position: relative;
      z-index: 5;
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 14px 40px;
      background: rgba(255,107,0,0.06);
      border-bottom: 1px solid rgba(255,107,0,0.1);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    #stats-bar span { color: var(--gold); }

    /* ── MAIN GRID ── */
    main {
      position: relative;
      z-index: 5;
      padding: 40px 32px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(.22,.68,0,1.2), box-shadow 0.25s, border-color 0.25s;
      animation: cardIn 0.4s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 12px 40px rgba(255,107,0,0.2), 0 0 0 1px rgba(255,107,0,0.3);
      border-color: rgba(255,107,0,0.4);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: contain;
      background: #0c0c0c;
      padding: 12px;
      display: block;
      transition: transform 0.3s ease;
    }

    .card:hover .card-img { transform: scale(1.04); }

    .card-body {
      padding: 16px;
      border-top: 1px solid rgba(255,107,0,0.12);
    }

    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.45rem;
      letter-spacing: 0.05em;
      color: var(--gold);
      margin-bottom: 10px;
      line-height: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }

    .tag {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(255,107,0,0.12);
      color: var(--orange);
      border: 1px solid rgba(255,107,0,0.2);
    }

    .tag.affil {
      background: rgba(255,184,0,0.1);
      color: var(--gold);
      border-color: rgba(255,184,0,0.2);
    }

    .card-ki {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .card-ki strong { color: var(--text); }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(6px);
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid rgba(255,107,0,0.25);
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      overflow: hidden;
      animation: modalIn 0.28s cubic-bezier(.22,.68,0,1.2);
      position: relative;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    #modal-close {
      position: absolute;
      top: 14px; right: 14px;
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text);
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      z-index: 2;
    }

    #modal-close:hover { background: var(--orange); }

    #modal-img {
      width: 100%;
      max-height: 340px;
      object-fit: contain;
      background: #0a0a0a;
      padding: 20px;
    }

    #modal-body {
      padding: 24px;
    }

    #modal-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.06em;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-field {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .modal-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 3px;
    }

    .modal-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── LOADING / EMPTY ── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }

    .state-msg .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .state-msg h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .state-msg p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,107,0,0.15);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: rgba(255,107,0,0.4); border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <div class="logo-wrap">
      <span class="logo-eyebrow">Universo</span>
      <h1>Dragon Ball</h1>
    </div>

    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Buscar personagem..." autocomplete="off">
    </div>
  </header>

  <div id="stats-bar">
    <div>Personagens: <span id="count-total">—</span></div>
    <div>Exibindo: <span id="count-show">—</span></div>
  </div>

  <main id="container">
    <div class="state-msg">
      <div class="spinner"></div>
      <h2>Carregando</h2>
      <p>Buscando personagens da API…</p>
    </div>
  </main>

  <!-- MODAL -->
  <div id="modal-overlay">
    <div id="modal">
      <button id="modal-close" aria-label="Fechar">✕</button>
      <img id="modal-img" src="" alt="">
      <div id="modal-body">
        <div id="modal-name"></div>
        <div class="modal-grid" id="modal-fields"></div>
      </div>
    </div>
  </div>

  <script>
    const container   = document.getElementById('container');
    const search      = document.getElementById('search');
    const countTotal  = document.getElementById('count-total');
    const countShow   = document.getElementById('count-show');
    const overlay     = document.getElementById('modal-overlay');
    const modalImg    = document.getElementById('modal-img');
    const modalName   = document.getElementById('modal-name');
    const modalFields = document.getElementById('modal-fields');
    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    let allChars = [];

    /* ── Normaliza um personagem da API para o formato interno ── */
    function normalizeChar(c) {
      return {
        name        : c.name        || '—',
        race        : c.race        || '',
        gender      : c.gender      || '',
        ki          : c.ki          || '—',
        maxKi       : c.maxKi       || '—',
        affiliation : c.affiliation || '',
        image       : c.image       || '',
        description : c.description || '',
      };
    }

    /* ── Proxies CORS com fallback automático ── */
    const API_BASE = 'https://dragonball-api.com/api/characters';
    const PROXIES = [
      (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      (url) => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
      (url) => `https://thingproxy.freeboard.io/fetch/${url}`,
    ];

    async function fetchWithProxy(apiUrl) {
      // Tenta direto primeiro (funciona no GitHub Pages)
      try {
        const res = await fetch(apiUrl);
        if (res.ok) return res.json();
      } catch (_) {}

      // Tenta cada proxy em sequência
      for (const proxy of PROXIES) {
        try {
          const res = await fetch(proxy(apiUrl));
          if (res.ok) {
            const text = await res.text();
            return JSON.parse(text);
          }
        } catch (_) {}
      }
      throw new Error('Todos os proxies falharam. Verifique sua conexão.');
    }

    /* ── Busca todas as páginas da API ── */
    async function fetchAllPages() {
      let page = 1;
      let collected = [];

      while (true) {
        const apiUrl = `${API_BASE}?page=${page}&limit=10`;
        const data = await fetchWithProxy(apiUrl);

        const items      = Array.isArray(data) ? data : (data.items ?? []);
        const totalPages = data?.meta?.totalPages ?? 1;

        collected = collected.concat(items.map(normalizeChar));

        // Renderiza progressivamente
        allChars = collected;
        countTotal.textContent = collected.length;
        render(collected);

        if (page >= totalPages || items.length === 0) break;
        page++;
      }

      return collected;
    }

    /* ── Ponto de entrada ── */
    async function fetchChars() {
      try {
        const chars = await fetchAllPages();
        if (!chars.length) throw new Error('Nenhum personagem retornado pela API.');
        allChars = chars;
        countTotal.textContent = allChars.length;
        render(allChars);
      } catch (err) {
        console.error('[DBZ API] Erro:', err);
        container.innerHTML = `
          <div class="state-msg">
            <div class="icon">⚡</div>
            <h2>Falha na conexão</h2>
            <p>Não foi possível carregar os dados da API.<br>
               <small style="color:var(--muted)">${err.message}</small></p>
            <button onclick="fetchChars()"
              style="margin-top:20px;padding:10px 24px;background:var(--orange);
                     color:#fff;border:none;border-radius:6px;font-family:inherit;
                     font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.05em">
              Tentar novamente
            </button>
          </div>`;
      }
    }

    function render(list) {
      countShow.textContent = list.length;

      if (!list.length) {
        container.innerHTML = `
          <div class="state-msg">
            <div class="icon">🔍</div>
            <h2>Sem resultados</h2>
            <p>Nenhum personagem encontrado para "<strong>${search.value}</strong>"</p>
          </div>`;
        return;
      }

      container.innerHTML = '';

      list.forEach((c, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${Math.min(i * 0.04, 0.6)}s`;

        card.innerHTML = `
          <img class="card-img" src="${c.image || ''}" alt="${c.name}" loading="lazy">
          <div class="card-body">
            <div class="card-name">${c.name}</div>
            <div class="card-tags">
              ${c.race       ? `<span class="tag">${c.race}</span>` : ''}
              ${c.gender     ? `<span class="tag">${c.gender}</span>` : ''}
              ${c.affiliation? `<span class="tag affil">${c.affiliation}</span>` : ''}
            </div>
            <div class="card-ki"><strong>Ki:</strong> ${c.ki || '—'}</div>
          </div>`;

        card.addEventListener('click', () => openModal(c));
        container.appendChild(card);
      });
    }

    function openModal(c) {
      modalImg.src = c.image || '';
      modalImg.alt = c.name;
      modalName.textContent = c.name;

      const fields = [
        ['Raça',        c.race],
        ['Gênero',      c.gender],
        ['Ki',          c.ki],
        ['Ki Máximo',   c.maxKi],
        ['Afiliação',   c.affiliation],
        ['Descrição',   c.description],
      ].filter(([, v]) => v);

      modalFields.innerHTML = fields.map(([label, val]) => `
        <div class="modal-field ${label === 'Descrição' ? 'full' : ''}">
          <div class="modal-label">${label}</div>
          <div class="modal-value">${val}</div>
        </div>`).join('');

      // span description full width
      modalFields.querySelectorAll('.full').forEach(el => el.style.gridColumn = '1 / -1');

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    search.addEventListener('input', () => {
      const q = search.value.toLowerCase().trim();
      render(q ? allChars.filter(c => c.name.toLowerCase().includes(q)) : allChars);
    });

    fetchChars();
  </script>
</body>
</html>
