<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One Piece Fan Site</title>

  <style>
    /* Reset básico */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

/* Barra de navegação */
nav {
    display: flex;
    align-items: center;
    background-color: #c62828;
    height: 80px;              /* altura da barra */
    padding: 0 20px;
    box-sizing: border-box;
}

/* Logo */
.logo {
    width: 60px;
    height: 70px;
    object-fit: contain;
    margin-right: 30px;
}

/* Menu */
.navbar {
    list-style: none;
    display: flex;
    align-items: center;
    padding: 0;
    margin: 0;
    gap: 25px;
}

.navbar a {
    text-decoration: none;
    color: white;
    font-weight: bold;
}

/* Pseudo-classe */
.navbar a:hover {
    color: #ffd700;
}

/* Conteúdo principal */
main {
    text-align: center;
    padding: 30px;
}

main img {
    width: 200px;
    margin: 20px 0;
}

p {
    font-size: 16px;
}

/* Formulário */
.formulario {
    margin-top: 30px;
}

.formulario input {
    padding: 8px;
    width: 200px;
}

.formulario button {
    padding: 8px 15px;
    background-color: #c62828;
    color: white;
    border: none;
    cursor: pointer;
}

.formulario button:hover {
    background-color: #8e0000;
}

/* Rodapé */
footer {
    background-color: #222;
    color: white;
    text-align: center;
    padding: 15px;
}
  </style>

  
</head>
<body>
  <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>One Piece Fan</title>
</head>
<body>

    <!-- Barra de Navegação -->
    <nav>
      <img src = "https://www.kindpng.com/picc/m/243-2434415_luffys-jolly-roger-one-piece-flag-4k-hd.png" alt = "Jolly Roger Chapéu de Palha" class="logo">
        <ul class="navbar">
            <li><a href="#">Início</a></li>
            <li><a href="#">Personagens</a></li>
            <li><a href="#">Arcos</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <!-- Conteúdo Principal -->
    <main>
        <h1>Bem-vindo ao Mundo de One Piece</h1>

        <img src="https://occ-0-8407-90.1.nflxso.net/dnm/api/v6/6AYY37jfdO6hpXcMjf9Yu5cnmO0/AAAABTD5IBluJHU26z36aocJP5-LWlluGDLKlhkZx7PC6d9aIyN-Sn8UEKSM0ViKuRB-L1ai9vbJ8Hb0D2sLIqGLBS9jogg_YfMQ1ExP.jpg?r=588" alt="Monkey D. Luffy">

        <p>
            One Piece é uma obra criada por Eiichiro Oda que acompanha a jornada de Monkey D. Luffy
            em busca do lendário tesouro conhecido como One Piece.
        </p>

        <!-- Formulário -->
        <section class="formulario">
            <h2>Receba novidades</h2>
            <form>
                <input type="text" placeholder="Digite seu nome">
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <!-- Rodapé -->
    <footer>
        <p>© 2025 - Site fã de One Piece</p>
    </footer>

</body>

</html>

  <script>
    
  </script>
</body>
</html>
